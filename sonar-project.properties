# SonarCloud Project Configuration
sonar.projectKey=gascity-extra_gascity.ts
sonar.organization=gascity-extra

# Security hotspot exclusions - false positives
# pty.ts: This endpoint is disabled in production and has comprehensive input validation
# It is designed for local development only and is safe for its intended use case
sonar.security.hotspots.exclusions=**/packages/@gascity/console/src/routes/api/pty.ts

# Issue exclusions by file pattern
# githubactions:S7637: We use version tags (v4, v1) instead of full commit SHA for maintainability
# This is a deliberate choice and the tags are maintained by action authors
sonar.issue.exclusions=**/.github/workflows/*.yml

# Rule-specific exclusions using multicriteria
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=githubactions:S7637
sonar.issue.ignore.multicriteria.e1.resourcePattern=**/.github/workflows/*.yml
