# SonarCloud Project Configuration
sonar.projectKey=gascity-extra_gascity.ts
sonar.organization=gascity-extra

# Security hotspot exclusions - false positives
# pty.ts: This endpoint is disabled in production and has comprehensive input validation
# It is designed for local development only and is safe for its intended use case
# mock-gc-supervisor.ts: This is a mock e2e test server, using /tmp/tmpdir is safe
sonar.security.hotspots.exclusions=**/packages/@gascity/console/src/routes/api/pty.ts,**/packages/@gascity/console/e2e/mock-gc-supervisor.ts

# Issue exclusions for false positives
# e2e tests: Force clicks are necessary for test reliability
# vite.config.ts: HMR regex is dev-only and acceptable
# packs-catalog.ts: Simple path normalization regex
# registry-toml.ts: Simple TOML parsing regex
sonar.issue.ignore.multicriteria=e1,e2,e3,e4
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S4144
sonar.issue.ignore.multicriteria.e1.resourceKey=**/packages/@gascity/console/e2e/**/*.spec.ts
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S6353
sonar.issue.ignore.multicriteria.e2.resourceKey=**/packages/@gascity/console/vite.config.ts
sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S6353
sonar.issue.ignore.multicriteria.e3.resourceKey=**/packages/@gascity/console/src/lib/packs-catalog.ts
sonar.issue.ignore.multicriteria.e4.ruleKey=typescript:S6353
sonar.issue.ignore.multicriteria.e4.resourceKey=**/packages/@gascity/console/src/lib/registry-toml.ts
