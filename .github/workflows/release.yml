name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7
        with:
          bun-version: latest
      - name: Get bun cache directory
        id: bun-cache
        run: echo "dir=$(bun pm cache dir)" >> $GITHUB_OUTPUT
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.bun-cache.outputs.dir }}
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build all packages
        run: bun run build
      - name: Publish to npm
        run: |
          set -e
          for pkg_dir in packages/*/*/; do
            if [ -f "$pkg_dir/package.json" ]; then
              # Check if package is private
              private=$(bun run -e "console.log(require('$pkg_dir/package.json').private)" 2>/dev/null || echo "false")
              if [ "$private" = "true" ]; then
                echo "Skipping private package: $pkg_dir"
                continue
              fi
              echo "Publishing package: $pkg_dir"
              cd "$pkg_dir"
              bun publish --trusted_oidc
              cd -
              echo "Successfully published: $pkg_dir"
            fi
          done
