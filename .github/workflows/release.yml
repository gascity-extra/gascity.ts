name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Get bun cache directory
        id: bun-cache
        run: echo "dir=$(bun pm cache dir)" >> $GITHUB_OUTPUT
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.bun-cache.outputs.dir }}
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build all packages
        run: bun run build
      - name: Publish to npm
        run: |
          for dir in packages/*/; do
            if [ -f "$dir/package.json" ]; then
              # Check if package is private
              private=$(bun run -e "console.log(require('./package.json').private)" 2>/dev/null || echo "false")
              if [ "$private" = "true" ]; then
                echo "Skipping private package: $dir"
                cd -
                continue
              fi
              cd "$dir"
              bun publish --trusted_oidc
              cd -
            fi
          done
