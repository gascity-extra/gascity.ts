name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - name: Install dependencies
        run: bun install
      - name: Run client tests
        run: cd packages/@gascity/client && bun run test
      - name: Run SDK tests
        run: cd packages/@gascity/sdk && bun run test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - name: Install dependencies
        run: bun install
      - name: Build client
        run: cd packages/@gascity/client && bun run build
      - name: Build SDK
        run: cd packages/@gascity/sdk && bun run build
      - name: Build console
        run: cd packages/@gascity/console && bun run build

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - name: Install dependencies
        run: bun install
      - name: Install Playwright
        run: bunx playwright install --with-deps
      - name: Run E2E tests
        run: bun run test:e2e
